name: Dev - Build & Deploy

on:
  push:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

env:
  ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
  ACR_NAME: ${{ secrets.ACR_NAME }}
  RG: ${{ secrets.AZURE_RG_DEV }}
  BACKEND_APP: ca-backend-dev
  FRONTEND_APP: ca-frontend-dev

jobs:
  build_push_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Login to Azure using OIDC (no secrets)
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Login docker to ACR using Azure identity (needs AcrPush)
      - name: Login to ACR
        run: az acr login --name $ACR_NAME

      - name: Build & Push Backend
        run: |
          docker build -t $ACR_LOGIN_SERVER/backend:${{ github.sha }} ./backend
          docker push $ACR_LOGIN_SERVER/backend:${{ github.sha }}

      - name: Build & Push Frontend
        run: |
          docker build -t $ACR_LOGIN_SERVER/frontend:${{ github.sha }} ./frontend
          docker push $ACR_LOGIN_SERVER/frontend:${{ github.sha }}

      - name: Deploy Backend to Dev
        run: |
          az extension add --name containerapp --upgrade
          az containerapp update -g $RG -n $BACKEND_APP \
            --image $ACR_LOGIN_SERVER/backend:${{ github.sha }}

      - name: Deploy Frontend to Dev
        run: |
          az containerapp update -g $RG -n $FRONTEND_APP \
            --image $ACR_LOGIN_SERVER/frontend:${{ github.sha }}